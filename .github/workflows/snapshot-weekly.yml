name: Weekly KPI snapshot

on:
  schedule:
    - cron: '0 7 * * 1'    # 07:00 UTC every Monday
  workflow_dispatch: {}     # also runnable on demand from the Actions tab

permissions:
  contents: read
  id-token: write           # for keyless auth, if you prefer it later

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.BIGQUERY_SNAPSHOT_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Run snapshot SQL
        run: |
          bq query --use_legacy_sql=false --location=EU < scripts/snapshot.sql
