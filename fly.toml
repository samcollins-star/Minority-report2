# fly.toml app configuration file generated for minority-report2 on 2026-05-13T08:29:13Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'minority-report2'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one machine warm so cold-starts don't make users wait/timeout.
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  # 256MB was OOM-killing the Next.js process during parallel BigQuery
  # fetches on dashboard load. 1GB gives ample headroom.
  memory_mb = 1024
